name: Backend CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run test:cov

      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Create .env.test
        run: |
          echo "DATABASE_TYPE=sqlite" > .env.test
          echo "DATABASE_NAME=test.voteAppDB.sqlite" >> .env.test
          echo "JWT_SECRET=test-secret-key" >> .env.test
          echo "JWT_EXPIRES_IN=1d" >> .env.test

      - run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── Semantic Versioning ──────────────────────────────────────────────────────
  # Reads commit messages since the last tag and bumps MAJOR/MINOR/PATCH
  # following Conventional Commits: feat → minor, BREAKING CHANGE → major,
  # everything else → patch. Creates and pushes a new git tag.

  version:
    name: Semantic Version
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine and apply version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LATEST_TAG#v}
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=%B 2>/dev/null || git log --pretty=%B)

          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST_TAG → $NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

  # ── CD — Staging (develop branch) ───────────────────────────────────────────

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Trigger Render staging deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}"

      - name: Wait for Render to initialise deploy
        run: sleep 30

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS — waiting 20 s..."
            sleep 20
          done
          echo "::error::Staging health check failed after 10 attempts"
          exit 1

  # ── CD — Production (master branch) ─────────────────────────────────────────
  # Blue-green strategy: Render deploys the new version alongside the running
  # one. Health checks verify the new version is responding correctly before
  # traffic is fully switched. On failure the workflow errors and a manual
  # rollback can be triggered from the Render dashboard (Deploys → Rollback).

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: version
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Trigger Render production deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for Render to initialise deploy
        run: sleep 60

      - name: Health check — verify new version is live
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/15: HTTP $STATUS — waiting 20 s..."
            sleep 20
          done
          echo "::error::Production health check failed — trigger a rollback from the Render dashboard."
          exit 1
